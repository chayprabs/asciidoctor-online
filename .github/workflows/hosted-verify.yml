name: Hosted Verify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check hosted deployment configuration
        id: config
        env:
          HOSTED_WEB_URL: ${{ vars.HOSTED_WEB_URL }}
          HOSTED_API_URL: ${{ vars.HOSTED_API_URL }}
          RENDER_WEB_DEPLOY_HOOK: ${{ secrets.RENDER_WEB_DEPLOY_HOOK }}
          RENDER_WORKER_DEPLOY_HOOK: ${{ secrets.RENDER_WORKER_DEPLOY_HOOK }}
        run: |
          if [ -n "$HOSTED_WEB_URL" ] && [ -n "$HOSTED_API_URL" ] && [ -n "$RENDER_WEB_DEPLOY_HOOK" ] && [ -n "$RENDER_WORKER_DEPLOY_HOOK" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "ready=false" >> "$GITHUB_OUTPUT"
          echo "Hosted verification skipped because deploy hooks or hosted URLs are not configured."
      - uses: actions/checkout@v6
        if: steps.config.outputs.ready == 'true'
      - uses: pnpm/action-setup@v6
        if: steps.config.outputs.ready == 'true'
        with:
          version: 10.33.1
      - uses: actions/setup-node@v6
        if: steps.config.outputs.ready == 'true'
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile || pnpm install
        if: steps.config.outputs.ready == 'true'
      - name: Trigger worker deploy
        if: steps.config.outputs.ready == 'true'
        run: curl -fsS -X POST "${{ secrets.RENDER_WORKER_DEPLOY_HOOK }}"
      - name: Trigger web deploy
        if: steps.config.outputs.ready == 'true'
        run: curl -fsS -X POST "${{ secrets.RENDER_WEB_DEPLOY_HOOK }}"
      - name: Wait for hosted deployment
        if: steps.config.outputs.ready == 'true'
        env:
          HOSTED_WEB_URL: ${{ vars.HOSTED_WEB_URL }}
          HOSTED_API_URL: ${{ vars.HOSTED_API_URL }}
        run: |
          for attempt in $(seq 1 40); do
            if pnpm verify:hosted --web-url="$HOSTED_WEB_URL" --api-url="$HOSTED_API_URL"; then
              exit 0
            fi
            sleep 15
          done
          exit 1
      - name: Refresh Section 19 rollup
        if: steps.config.outputs.ready == 'true'
        run: pnpm verify:section19
